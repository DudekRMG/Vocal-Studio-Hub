kind = "web"
previewPath = "/"
title = "Vocal.uz — Singing Studio"
version = "1.0.0"
id = "artifacts/vocal-uz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21729

[services.development]
run = "pnpm --filter @workspace/vocal-uz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vocal-uz", "run", "build" ]
publicDir = "artifacts/vocal-uz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21729"
BASE_PATH = "/"
